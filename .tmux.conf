# unbinds
unbind-key d
unbind-key q
unbind-key w
unbind-key e
unbind-key C-b

# prefix
set -g prefix C-o
bind-key C-o send-prefix


# reduce delay
set -sg escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#### key bindings ####

# reload config file
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# quickly open a new window
bind n new-window

# Define a key binding to open the popup
bind p display-popup -E "bash -i ~/code/github.com/dotfiles/scripts/tmux/session_manager.sh"

# synchronize all panes in a window
bind y setw synchronize-panes

# pane movement shortcuts (same as vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# enable mouse support for switching panes/windows
set -g mouse on

# split panes
bind v splitw -v -c "#{pane_current_path}" 
bind b splitw -h -c "#{pane_current_path}" 

# open terminal with 20% of view height
bind t splitw -v -p 20

# clone git repository and start a new session
bind g splitw -v "bash -i ~/code/github.com/dotfiles/scripts/tmux/git_clone.sh"

# vi text navigation 
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
